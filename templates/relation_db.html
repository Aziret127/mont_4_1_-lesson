<h1> Список машин с тегами </h1>

{% for i in nummer_car %}

<p>{{ i.namecar }}</p>
<p>Теги</p>
   <p>Категория</p>
   {% for j in i.tags.all%}
   <p>#{{ j.name }}</p>
    {% endfor %}

<p>Кимментарий</p>
{% for k in i.review.all %}

<p>{{ k.mark }}</p>
<p>{{ k.text }}</p>
<p>{{ k.created_at }}</p>

   {%endfor%}

{% endfor%}
